<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Section Missing | Gold Pouch 404</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .grid {
            position: absolute;
            width: 100%; height: 100%;
            background-image: linear-gradient(to right, rgba(255,68,68,0.06) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,68,68,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }
        .container {
            position: relative;
            z-index: 2;
            padding: 30px;
            border: 2px solid #d4af37;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 15px 40px rgba(212,175,55,0.15);
        }
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 5rem;
            margin: 0 0 10px 0;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(255,223,0,0.3);
        }
        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #555;
        }
        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: #111;
            border: 2px solid #d4af37;
            padding: 12px 30px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #d4af37;
            color: #fff;
            box-shadow: 0 0 15px #ffdf00;
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="container">
        <h1>404</h1>
        <p>This pouch segment does not contain valid assets.</p>
        <a href="index.html" class="back-btn">Return to Base</a>
    </div>
</body>
</html>
