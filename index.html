<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remedy Tech Zone | Premium Electronic Healthcare & Biohacking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/responsive.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Cinzel', 'serif'],
                    },
                    colors: {
                        gold: {
                            50: '#FFFDF0',
                            100: '#FFFBE0',
                            200: '#FFF3A1',
                            300: '#F0D16E',
                            400: '#E1B03C',
                            500: '#D4AF37',
                            600: '#AA771C',
                            700: '#805510',
                            800: '#543505',
                            900: '#2B1B04',
                            950: '#110D03',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2.5s infinite linear',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' }
                        }
                    }
                }
            }
        }</script>
    <style>
        /* Glassmorphism custom classes */
        .glass-panel {
            background: rgba(17, 13, 3, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .glass-panel-hover:hover {
            border-color: rgba(212, 175, 55, 0.4);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.15);
            transform: translateY(-4px);
        }
        /* Custom scrollbar matching liquid gold */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #110D03;
        }

        ::-webkit-scrollbar-thumb {
            background: #AA771C;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #D4AF37;
        }

        /* Pop Out & Slide Right Click Animation */
        @keyframes popOutSlideRight {
            0% { transform: scale(1) translateX(0); box-shadow: 0 0 0 rgba(212, 175, 55, 0); }
            30% { transform: scale(1.04) translateX(2px); box-shadow: -4px 4px 15px rgba(212, 175, 55, 0.15); }
            100% { transform: scale(1) translateX(0); box-shadow: 0 0 0 rgba(212, 175, 55, 0); }
        }

        .animate-click-pop-slide {
            animation: popOutSlideRight 0.3s cubic-bezier(0.25, 1, 0.5, 1) 1 !important;
        }
    </style>
</head>
