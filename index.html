<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Pouch | Premium Affiliate & E-commerce</title>
    
    <!-- Tailwind CSS (Consolidated Styling Strategy) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            400: '#F1D570',
                            500: '#D4AF37', // Premium Gold
                            600: '#B08D28',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Cinzel', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

        body { background-color: #FAFAFA; color: #111111; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        h1, h2, h3, .font-serif { font-family: 'Cinzel', serif; }

        .bg-grid {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255, 0, 0, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -2; pointer-events: none;
        }

        #neon-background { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; opacity: 0.6; }

        .btn-gold {
            background: linear-gradient(135deg, #F1D570 0%, #D4AF37 50%, #B08D28 100%);
            color: white; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            border-radius: 9999px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease; border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6); }

        .slider-container { display: flex; gap: 1.5rem; overflow-x: auto; scroll-behavior: smooth; snap-type: x mandatory; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .slider-item { flex-shrink: 0; width: 100%; scroll-snap-align: start; }
        @media (min-width: 640px) { .slider-item { width: calc(50% - 0.75rem); } }
        @media (min-width: 1024px) { .slider-item { width: calc(33.333% - 1rem); } }

        .premium-card {
            background: white; border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; height: 100%; cursor: pointer;
        }
        .premium-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(212, 175, 55, 0.15); border-color: #D4AF37; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px); z-index: 50; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content { background: white; border: 2px solid #D4AF37; border-radius: 1.5rem; width: 90%; max-width: 1000px; max-height: 85vh; overflow-y: auto; }
        header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body class="relative">

    <div class="bg-grid"></div>
    <canvas id="neon-background"></canvas>

    <div id="app-view">
        <header class="fixed top-0 w-full z-40">
            <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
                <div class="flex items-center gap-3 cursor-pointer" onclick="window.scrollTo(0,0)">
                    <div class="w-10 h-10 rounded-full bg-gold-500 flex items-center justify-center text-white font-bold text-xl shadow-lg border-2 border-white">G</div>
                    <span class="font-serif font-bold text-2xl tracking-wider">Gold Pouch</span>
                </div>
            </div>
        </header>

        <main class="pt-32 pb-20 max-w-screen-2xl mx-auto px-4">
            <section id="ecommerce" class="mb-32">
                <h2 class="text-4xl md:text-5xl font-bold text-center mb-12">Premium Selection</h2>
                <div class="relative w-full px-2 sm:px-10">
                    <button onclick="scrollSlider('ecommerce-track', -1)" class="absolute -left-2 sm:left-0 top-1/2 -translate-y-1/2 z-20 bg-white hover:bg-gold-500 text-gold-500 hover:text-white border border-gold-500/30 w-12 h-12 rounded-full flex items-center justify-center shadow-lg transition-all transform active:scale-95">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <div id="ecommerce-track" class="slider-container scrollbar-hide py-4 px-2"></div>
                    <button onclick="scrollSlider('ecommerce-track', 1)" class="absolute -right-2 sm:right-0 top-1/2 -translate-y-1/2 z-20 bg-white hover:bg-gold-500 text-gold-500 hover:text-white border border-gold-500/30 w-12 h-12 rounded-full flex items-center justify-center shadow-lg transition-all transform active:scale-95">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m9 5 7 7-7 7"></path></svg>
                    </button>
                </div>
                <div class="text-center mt-12"><button onclick="openModal('products')" class="btn-gold px-10 py-4">See More Products</button></div>
            </section>

            <section id="blog" class="mb-20">
                <h2 class="text-4xl md:text-5xl font-bold text-center mb-12">Wealth Insights</h2>
                <div class="relative w-full px-2 sm:px-10">
                    <button onclick="scrollSlider('blog-track', -1)" class="absolute -left-2 sm:left-0 top-1/2 -translate-y-1/2 z-20 bg-white hover:bg-gold-500 text-gold-500 hover:text-white border border-gold-500/30 w-12 h-12 rounded-full flex items-center justify-center shadow-lg transition-all transform active:scale-95">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <div id="blog-track" class="slider-container scrollbar-hide py-4 px-2"></div>
                    <button onclick="scrollSlider('blog-track', 1)" class="absolute -right-2 sm:right-0 top-1/2 -translate-y-1/2 z-20 bg-white hover:bg-gold-500 text-gold-500 hover:text-white border border-gold-500/30 w-12 h-12 rounded-full flex items-center justify-center shadow-lg transition-all transform active:scale-95">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m9 5 7 7-7 7"></path></svg>
                    </button>
                </div>
                <div class="text-center mt-12"><button onclick="openModal('blogs')" class="btn-gold px-10 py-4">See More Blogs</button></div>
            </section>
        </main>
    </div>

    <div id="main-modal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal-content p-8 relative">
            <button onclick="closeModal(null, true)" class="absolute top-4 right-4 text-2xl">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

            },
            {

                img: "https://m.media-amazon.com/images/I/61uxIbcWPRL._AC_SY300_SX300_QL70_FMwebp_.jpg", 
                desc: "AI-powered lightweight smart ring featuring Sleep Apnea monitoring. Absolutely no subscription fees. HSA/FSA approved.",
                affiliateUrl: "https://www.amazon.com/RingConn-Monitoring-Subscription-Battery-Compatible/dp/B0DG2SJJ7Q?crid=2ME5RBF18ER5G&dib=eyJ2IjoiMSJ9.Hhl13JtDGk6htPaoIpcEgVlSdvC4GcRKEtiGeNPSWJZoSEIIUTnUsxrKkEUrYA54WJfBGlDu5anF-pddonbUJ3B_Ss2Dr_ZJnLTFrk4ZG0WifZWdEqKF216tC4UC4CpC2xlPnyfYgP8p98_LlkC_kIaty6tgaZqqu6xye4F2uXTAL2Pt3hCf5HN_MASevGHEM8xr9KfDEgMjdr3E-GL1ZfcTJePDzQVilKKgPJbl_AI.Q6dtsmUWtsXDG4E9H7IUcxBuXelB4l6nT7cm5m2i_6M&dib_tag=se&keywords=health%2Bring&qid=1779824719&sprefix=health%2B%2Caps%2C171&sr=8-1-spons&sp_csd=d2lkZ2V0TmFtZT1zcF9hdGY&th=1&linkCode=ll2&tag=tay1225060-20&linkId=ec97237f1c6ffd52044105b157c6437e&language=en_US&ref_=as_li_ss_tl"

                affiliateUrl: "https://www.amazon.com/KAUGIC-Upgraded-Removal-One-Piece-Waste/dp/B0CYBPNMLM?crid=2QNETOMXOZO1N&dib=eyJ2IjoiMSJ9.4IMUQa6DjgvAbVqSygLv-1ChkCbcLURRz-3vHIkoDw5ycdcbEWlO2zYN-mZP68qOXEKispHosO7NbA7MPi8RDT8HEvdQSeQ72DvtmKVp1z4dAhphM5oVT1n6e3qffTnpw5WKA910Cg8KjtGDkG8fiVJuYmOb-3MQKqFaLsmu1pVK0a9_SyMUGHfqd4HaZ29GJyTdrdX0xXXeVS6RWGo6GggXDhndCQNTWdltf111Fc0WOQk6wc9tzOcnKIs5QHqT595oNyvWObnwztm7lFLCDhjn335-oWVhAmBjGKzT8bI.P7KQEFCJj9FcCc8HwF9IvNa2CKUblV7uXJr4w_GAbRA&dib_tag=se&keywords=ear%2Bcleaner&qid=1779839927&s=hpc&sprefix=ear%2Bclean%2Chpc%2C534&sr=1-2-spons&sp_csd=d2lkZ2V0TmFtZT1zcF9hdGY&th=1&linkCode=ll2&tag=tay1225060-20&linkId=c062d3f610c8f6336164d0d2a433b10c&language=en_US&ref_=as_li_ss_tl" 
            },
            { 
                id: 5, 
                title: "NASAL IRRIGATION SYSTEM",

                desc: "Naväge uses powered suction to flush out allergens, mucus, and dust. Enjoy fast, all-natural, drug-free relief from congestion.",
                affiliateUrl: "https://www.amazon.com/Navage-Nasal-Irrigation-Basic-Bundle/dp/B01787L6QY?crid=GGRUQP8OITVL&dib=eyJ2IjoiMSJ9.pFK3KGG3BpYzmQLMU-b04fEwPM8z91SfiO4BuOWsBmCZmsi4-qXu64uJuNjysoRf61ogHN-4mr7pY6oLxG7nRPYf8ht2vctrA3Ca13KdsYWERiSbO3qsEJHx3_JmMviztRYMae9X2449xJ5iO_tKCiPHTQKG8IFxBR5KjpCuQdCw6nsq9rtQk8g-KELiOhHm6dGRCXabFoKrAIZbOxlFDBqdUt6iLfYGv2TlhpFw1K86-Taef8ewJvmh79II-tXzna7Z65ISwx6kHDXj5w1CcA8tGFeIlA9HUsS-jRULucI.NUSJbjD26H6aOaGj-qCayTvIj6z8UOHq8e_KWWNy4Vk&dib_tag=se&keywords=NOSE%2BCLEANER&qid=1779842936&s=hpc&sprefix=nose%2Bcleaner%2Chpc%2C244&sr=1-1-spons&sp_csd=d2lkZ2V0TmFtZT1zcF9hdGY&th=1&linkCode=ll2&tag=tay1225060-20&linkId=138aacd6f07af8c06f83e26331c8f58f&language=en_US&ref_=as_li_ss_tl" 
            }
        ];

        const blogAssets = [
            { id: 1, title: "Maximizing High-Ticket Affiliate ROI", date: "Oct 15, 2026", img: "📈", excerpt: "Learn the secrets to closing premium affiliate deals with consistency." },
            { id: 2, title: "The Psychology of Premium Branding", date: "Oct 10, 2026", img: "🧠", excerpt: "Why aesthetics like gold and white convert higher-tier clients." },
            { id: 3, title: "Structuring Your Sales Funnel", date: "Oct 05, 2026", img: "🌪️", excerpt: "A step-by-step guide to building a funnel that sells for you 24/7." },
            { id: 4, title: "Email Marketing for Luxury Niches", date: "Sep 28, 2026", img: "✉️", excerpt: "Crafting copy that appeals to high-net-worth individuals." },
            { id: 5, title: "Passive Income Myths Debunked", date: "Sep 20, 2026", img: "💡", excerpt: "The reality of building true wealth through digital assets." }
        ];

        function createCard(item, type) {
            const isProduct = type === 'product';
            const imgHtml = item.img.startsWith('http') ? `<img src="${item.img}" class="h-full w-full object-contain">` : `<span class="text-6xl">${item.img}</span>`;
            return `
                <div class="premium-card flex flex-col p-6 h-full" onclick="openDetails('${type}', ${item.id})">
                    <div class="h-40 bg-gray-50 rounded-lg flex items-center justify-center mb-4 border border-gray-100 flex-shrink-0 overflow-hidden">
                        ${imgHtml}
                    </div>
                    <h3 class="font-bold text-lg mb-2 text-gray-900">${item.title}</h3>
                    ${isProduct 
                        ? `<p class="text-gold-500 font-semibold text-xl mt-auto">${item.price}</p>` 
                        : `<p class="text-sm text-gray-400 mb-2">${item.date}</p><p class="text-gray-600 text-sm mt-auto">${item.excerpt}</p>`}
                </div>
            `;
        }

        function populateSlider(containerId, data, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = data.map(item => `
                <div class="slider-item">
                    ${createCard(item, type)}
                </div>`).join('');
        }

        function scrollSlider(trackId, direction) {
            const track = document.getElementById(trackId);
            if (!track) return;
            const firstItem = track.querySelector('.slider-item');
            if (firstItem) {
                const scrollStep = firstItem.offsetWidth + 24; // Card width + flex gap
                track.scrollBy({ left: direction * scrollStep, behavior: 'smooth' });
            }
        }

        function openModal(type) {
            let html = '';
            let data = type === 'products' ? eCommerceAssets : blogAssets;
            let title = type === 'products' ? 'Premium Products Catalog' : 'Wealth Insights Archive';
            let itemType = type === 'products' ? 'product' : 'blog';

            html += `<h2 class="text-3xl font-serif font-bold text-gray-900 mb-6 border-b border-gold-500/20 pb-4">${title}</h2>`;
            html += `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 pb-4">`;
            
            data.forEach(item => {
                html += `<div class="w-full">${createCard(item, itemType)}</div>`;
            });
            
            html += `</div>`;
            
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('main-modal').classList.add('active');
        }

        function openDetails(type, id) {
            const dataSet = type === 'product' ? eCommerceAssets : blogAssets;
            const item = dataSet.find(i => i.id === id);
            
            if (!item) return;

            let actionButton = '';
            if (type === 'product') {
                actionButton = `
                    <a href="${item.affiliateUrl}" target="_blank" rel="noopener noreferrer" class="btn-gold px-10 py-3.5 inline-block text-center text-sm tracking-widest">
                        Buy on Amazon
                    </a>
                `;
            }

            const imgHtml = item.img.startsWith('http') ? `<img src="${item.img}" class="h-full w-full object-contain">` : `<span class="text-6xl">${item.img}</span>`;

            document.getElementById('modal-body').innerHTML = `
                <div class="text-center pt-4">
                    <div class="w-32 h-32 mx-auto bg-gray-50 rounded-full flex items-center justify-center mb-6 shadow-inner border border-gold-500/30 overflow-hidden">
                        ${imgHtml}
                    </div>
                    <h2 class="text-3xl font-serif font-bold text-gray-900 mb-2">${item.title}</h2>
                    ${type === 'product' 
                        ? `<p class="text-2xl text-gold-500 font-bold mb-6">${item.price}</p>`
                        : `<p class="text-md text-gray-500 mb-6">${item.date}</p>`
                    }
                    <p class="text-gray-600 text-lg max-w-lg mx-auto mb-8 leading-relaxed text-justify">
                        ${item.desc || item.excerpt} 
                    </p>
                    <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
                        ${actionButton}
                        <button class="bg-gray-100 text-gray-800 hover:bg-gold-500 hover:text-white font-semibold px-8 py-3.5 rounded-full transition-colors text-sm uppercase tracking-wider" onclick="openModal('${type === 'product' ? 'products' : 'blogs'}')">
                            Back to List
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('main-modal').classList.add('active');
        }

        function closeModal(e, force = false) { 
            if (force || e.target.id === 'main-modal') {
                document.getElementById('main-modal').classList.remove('active'); 
            }
        }

        window.onload = () => {
            populateSlider('ecommerce-track', eCommerceAssets, 'product');
            populateSlider('blog-track', blogAssets, 'blog');
        };
    </script>
</body>
</html>
