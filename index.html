            const imgVal = item.img;
            if (imgVal && (imgVal.startsWith('http') || imgVal.includes('.'))) {

            return `<span class="text-6xl">${imgVal || placeholder}</span>`;

            const placeholder = isProduct ? "📦" : "📄";

            const track = document.getElementById(trackId);
            if (!track) return;
            const firstItem = track.querySelector('.slider-item');
            if (firstItem) {
                const scrollStep = firstItem.offsetWidth + 24; 
                track.scrollBy({ left: direction * scrollStep, behavior: 'smooth' });
            }
        }

        const modalBody = document.getElementById('modal-body');

            let html = '';
            let data = type === 'products' ? eCommerceAssets : blogAssets;
            let title = type === 'products' ? 'Premium Products Catalog' : 'Wealth Insights Archive';
            let itemType = type === 'products' ? 'product' : 'blog';

            html += `<h2 class="text-3xl font-serif font-bold text-gray-900 mb-6 border-b border-gold-500/20 pb-4">${title}</h2>`;

            data.forEach(item => { html += `<div class="w-full">${createCard(item, itemType)}</div>`; });

            modalBody.innerHTML = html;
            modal.classList.add('active');
        }

                    </a>
                `;
            }

            const placeholder = type === 'product' ? "📦" : "📄";
            const detailedContent = item.desc || item.excerpt;

            modalBody.innerHTML = `
                <div class="text-center pt-4">
                    <div class="w-full h-48 mx-auto bg-gray-50 rounded-xl flex items-center justify-center mb-6 shadow-inner border border-gold-500/30 overflow-hidden">

                            Back to List
                        </button>
                    </div>
                </div>
            `;
            modal.classList.add('active');
        }

        function closeModal(e, force = false) {
            if (force || e.target === modal) {
                modal.classList.remove('active');
                setTimeout(() => { modalBody.innerHTML = ''; }, 300);
            }
        }

        function handleRouting() {
            const hash = window.location.hash;
            const appView = document.getElementById('app-view');
            const notFoundView = document.getElementById('404-view');

            if (hash && hash !== '#' && hash !== '#ecommerce' && hash !== '#blog') {
                appView.classList.add('hidden');
                notFoundView.classList.remove('hidden');
                closeModal(null, true);
            } else {
                appView.classList.remove('hidden');
                notFoundView.classList.add('hidden');
            }
        }
        window.addEventListener('hashchange', handleRouting);

            const canvas = document.getElementById('neon-background');
            const ctx = canvas.getContext('2d');
            let w, h;
            
            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            let time = 0;

            function drawHeartRate() {
                ctx.clearRect(0, 0, w, h);
                const centerY = h / 2;
                const pathWidth = Math.min(w * 0.8, 800);
                const startX = (w - pathWidth) / 2;
                
                const points = [
                    {x: 0, y: 0}, {x: pathWidth * 0.2, y: 0}, {x: pathWidth * 0.25, y: -40},
                    {x: pathWidth * 0.3, y: 50}, {x: pathWidth * 0.35, y: -80}, {x: pathWidth * 0.4, y: 0},
                    {x: pathWidth * 0.45, y: -60}, {x: pathWidth * 0.5, y: 20}, {x: pathWidth * 0.55, y: -60},
                    {x: pathWidth * 0.6, y: 0}, {x: pathWidth * 0.65, y: -50}, {x: pathWidth * 0.7, y: 40},
                    {x: pathWidth * 0.75, y: -20}, {x: pathWidth * 0.8, y: 0}, {x: pathWidth, y: 0}
                ];

                ctx.strokeStyle = '#D4AF37'; ctx.lineWidth = 3; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                const pulse = Math.sin(time) * 0.5 + 0.5;
                ctx.shadowBlur = 10 + (15 * pulse); ctx.shadowColor = '#D4AF37'; ctx.globalAlpha = 0.4 + (0.3 * pulse);

                ctx.beginPath();
                ctx.moveTo(startX + points[0].x, centerY + points[0].y);
                for(let i = 1; i < points.length; i++) { ctx.lineTo(startX + points[i].x, centerY + points[i].y); }
                ctx.stroke();

                const totalPoints = points.length;
                const blipProgress = (time * 2) % (totalPoints - 1);
                const startIndex = Math.floor(blipProgress);
                const endIndex = startIndex + 1;
                
                if (endIndex < totalPoints) {
                    const t = blipProgress - startIndex;
                    const p1 = points[startIndex]; const p2 = points[endIndex];
                    const blipX = startX + p1.x + (p2.x - p1.x) * t;
                    const blipY = centerY + p1.y + (p2.y - p1.y) * t;
                    
                    ctx.beginPath();
                    ctx.arc(blipX, blipY, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#FFF'; ctx.shadowBlur = 20; ctx.shadowColor = '#F1D570';
                    ctx.fill();
                }

                time += 0.05;
                requestAnimationFrame(drawHeartRate);
            }

            drawHeartRate();
        }

        window.onload = () => {
            populateSlider('ecommerce-track', eCommerceAssets, 'product');
            populateSlider('blog-track', blogAssets, 'blog');
            initCanvasAnimation();
            handleRouting();
        };
    </script>
